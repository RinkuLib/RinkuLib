name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'RinkuLib/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer (in RinkuLib) reads git history and tags

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Generate API metadata
        run: docfx metadata docs/docfx.json

      - name: Build the site
        run: docfx build docs/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Prune old deployment records
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest=$(gh api "repos/${{ github.repository }}/deployments?environment=github-pages&per_page=1" --jq '.[0].id')
          gh api --paginate "repos/${{ github.repository }}/deployments?environment=github-pages&per_page=100" --jq '.[].id' | while read -r id; do
            [ "$id" = "$latest" ] && continue
            gh api -X POST "repos/${{ github.repository }}/deployments/$id/statuses" -f state=inactive --silent || true
            gh api -X DELETE "repos/${{ github.repository }}/deployments/$id" --silent || true
          done
