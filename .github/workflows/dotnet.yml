name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer (in RinkuLib) reads git history and tags

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0
            10.0

      - name: Restore dependencies
        run: dotnet restore RinkuLib.slnx

      - name: Build the solution
        run: dotnet build RinkuLib.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: cd ./RinkuLib.Tests/ && dotnet run --configuration Release --no-build --verbosity normal --framework net10.0

      - name: Run analyzer tests
        run: dotnet test RinkuLib.Analyzers/RinkuLib.Analyzers.Test/RinkuLib.Analyzers.Test.csproj --configuration Release --no-build --verbosity normal
